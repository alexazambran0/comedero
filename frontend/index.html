<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitor Comedero</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #f4f6f8; color: #111827; }
      main { max-width: 820px; margin: 28px auto; padding: 0 14px; display: grid; gap: 14px; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; }
      h1 { font-size: 28px; }
      .status { display: grid; gap: 8px; }
      .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
      .normal { background: #dcfce7; color: #166534; }
      .bajo { background: #fef9c3; color: #854d0e; }
      .critico { background: #fee2e2; color: #991b1b; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; border-bottom: 1px solid #e5e7eb; padding: 8px 6px; font-size: 14px; }
      th { font-size: 12px; text-transform: uppercase; color: #6b7280; }
    </style>
  </head>
  <body>
    <main>
      <h1>Monitor del Comedero</h1>

      <section class="card status">
        <p id="nivel">Nivel: ...</p>
        <p id="motor">Motor: ...</p>
        <p id="hora">Ultima lectura: ...</p>
        <p>Estado: <span id="estado-badge" class="badge">...</span></p>
      </section>

      <section class="card">
        <h2>Ultimas lecturas</h2>
        <table>
          <thead>
            <tr>
              <th>Hora</th>
              <th>Nivel</th>
              <th>Motor</th>
            </tr>
          </thead>
          <tbody id="tabla-historial"></tbody>
        </table>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
